name: frontmatter-lint   # POL-004 — implemented in B1.3
on: [pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install pyyaml jsonschema
      - name: validate artifact front matter + ID uniqueness
        run: python control/scripts/frontmatter_lint.py
      - name: unit tests (all control/scripts)
        run: pip install pytest && python -m pytest control/scripts/tests -q
        env: {PYTHONPATH: control/scripts}
      - name: manifest generator determinism (_generated matches manifests)
        run: python control/scripts/manifest_generator.py --check
