name: frontmatter-lint   # POL-004 — implemented in B1.3
on: [pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install pyyaml jsonschema
      - name: validate artifact front matter + ID uniqueness
        run: python control/scripts/frontmatter_lint.py
      - name: unit tests
        run: pip install pytest && python -m pytest control/scripts/tests/test_frontmatter_lint.py -q
        env: {PYTHONPATH: control/scripts}
