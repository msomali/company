name: eval-runner   # POL-006 — SKELETON, implemented in B5.1
on:
  pull_request:
    paths: [control/prompts/**, control/manifests/**, control/policies/**]
  schedule: [{cron: '0 3 * * *'}]
jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python control/scripts/eval_runner.py --config control/evals/runner.yaml  # TODO(B5.1)
