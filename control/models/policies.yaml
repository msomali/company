# v2.1 §81. Structure fixed; provider/model values filled by owner (task B0.3, 2026-07-16).
mode: S   # S = subscription/account auth (ACTIVE, ADR-B003) | P = routing proxy + API keys (dormant fallback; owner-approved ADR required to reactivate)
mode_s:                          # ACTIVE (ADR-B003)
  concurrency_cap: 3            # max simultaneous model sessions across all agents
  prices_file: control/models/prices.yaml
mode_p:                          # dormant fallback — LiteLLM standard per v2 §81 Mode P; reactivation = owner ADR
  kind: litellm
  budget_alert_thresholds: [0.60, 0.85]
policies:
  reasoning-max:                 # implementers/architects — Anthropic family
    primary: anthropic/claude-fable-5
    fallback: anthropic/claude-opus-4-8
  standard:                      # reviewers incl. SAT — OpenAI family in BOTH slots,
    primary: openai/gpt-5.6-sol  # so MODEL-001 decorrelation vs reasoning-max holds
    fallback: openai/gpt-5.5     # even during fallback windows
  economy:                       # dormant/light roles
    primary: anthropic/claude-haiku-4-5
    fallback: openai/gpt-5.6-luna
rules:
  - id: MODEL-001
    text: SAT resolves to a different model family than the implementer of the same artifact.
  - id: MODEL-002
    text: Fallbacks are evaluated (v2 §47) and never silently weaker on safety.
agents:   # key -> policy; must mirror v1 §48.3 (short codes per ADR-B001)
  PJM: standard
  SAA: reasoning-max
  UUD: standard
  SDE: reasoning-max
  SAT: standard
  SSE: reasoning-max
  DPC: standard
  DCE: standard
  DE: standard
  AIE: reasoning-max
  TW: economy
  ALE: economy
  LIN: economy
